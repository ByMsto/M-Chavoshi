<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-CHAVOSHI | موزیک و ڕەسەنایەتی</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/nizar-nastaliq-kurdish" rel="stylesheet">

    <style>
        :root {
            --primary: #1db954;
            --bg-deep: #050505;
            --sidebar-bg: #000000;
            --card-hover: rgba(255, 255, 255, 0.1);
            --text-white: #ffffff;
            --text-gray: #b3b3b3;
            --sidebar-width: 260px;
        }

        /* 🌈 واتەرمارکی مستۆ RGB */
        .msto-watermark {
            position: fixed;
            top: 25px;
            left: 25px;
            font-size: 45px;
            font-family: 'Nizar Nastaliq Kurdish', serif;
            z-index: 9999;
            animation: rgb-glow 6s infinite linear;
            pointer-events: none;
            filter: drop-shadow(0 0 15px #000);
        }
        @keyframes rgb-glow {
            0% { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
            33% { color: #00ff00; text-shadow: 0 0 15px #00ff00; }
            66% { color: #0000ff; text-shadow: 0 0 15px #0000ff; }
            100% { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
        }

        /* 🔄 ئەنیمەیشنی سوڕانەوەی خۆرەکە */
        @keyframes rotate-sun {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-white);
            height: 100vh;
            display: grid;
            grid-template-areas: "sidebar main" "player player";
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: 1fr 100px;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            grid-area: sidebar;
            background: var(--sidebar-bg);
            padding: 25px;
            border-left: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .logo { font-size: 26px; font-weight: 900; color: var(--primary); margin-bottom: 20px; letter-spacing: 1px; }
        .nav-item {
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-gray);
            display: flex; align-items: center; gap: 15px;
            font-weight: 700; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: var(--card-hover); color: var(--text-white); }

        /* Main Content */
        #main {
            grid-area: main;
            overflow-y: auto;
            background: linear-gradient(180deg, #122c1e 0%, #050505 45%);
            padding-bottom: 40px;
        }
        .header-content {
            padding: 80px 40px 40px;
            display: flex; align-items: flex-end; gap: 35px;
        }

        /* ☀️ دیزاینی خۆرە سوڕاوەکە */
        .header-img {
            width: 250px; height: 250px;
            border-radius: 50%; /* دەیکەین بە بازنەی تەواو بۆ شێوەی خۆر */
            box-shadow: 0 0 50px rgba(29, 185, 84, 0.3);
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.1);
            animation: rotate-sun 20s infinite linear;
        }

        .header-text h1 { font-size: 75px; font-weight: 900; margin-bottom: 10px; letter-spacing: -2px; }
        #currentSongDisplay { 
            color: var(--primary); 
            font-weight: 900; 
            font-size: 18px; 
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(29, 185, 84, 0.5);
            display: block;
            height: 25px;
        }

        /* Song List */
        .song-list-container { padding: 0 40px; }
        .table-header {
            display: grid;
            grid-template-columns: 50px 1fr 180px 100px 50px;
            padding: 15px 20px;
            color: var(--text-gray);
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 10px;
        }
        .song-row {
            display: grid;
            grid-template-columns: 50px 1fr 180px 100px 50px;
            padding: 12px 20px;
            align-items: center;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .song-row:hover { background: var(--card-hover); }
        .song-row.playing { background: rgba(29, 185, 84, 0.1); color: var(--primary); }
        .song-title-group { display: flex; align-items: center; gap: 15px; }
        .song-row img { width: 45px; height: 45px; border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* Player Bar */
        #player {
            grid-area: player;
            background: #000;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            padding: 0 35px;
            align-items: center;
            z-index: 100;
        }
        .player-info { display: flex; align-items: center; gap: 15px; }
        .player-controls { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .control-btns { display: flex; align-items: center; gap: 30px; }
        
        .play-btn { 
            width: 50px; height: 50px; background: #fff; border: none; 
            border-radius: 50%; font-size: 22px; cursor: pointer;
            transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .play-btn:hover { transform: scale(1.08); background: var(--primary); color: #fff; }

        .repeat-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .repeat-btn.active { opacity: 1; color: var(--primary); transform: scale(1.1); }
        
        .progress-container { width: 100%; display: flex; align-items: center; gap: 15px; direction: ltr; }
        .progress-bar { flex: 1; height: 6px; background: #333; border-radius: 10px; cursor: pointer; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; border-radius: 10px; transition: width 0.1s linear; }

        .vol-slider { -webkit-appearance: none; width: 120px; height: 5px; background: #333; border-radius: 10px; cursor: pointer; accent-color: var(--primary); direction: ltr; }

        @media (max-width: 768px) {
            body { grid-template-areas: "main" "player" "sidebar"; grid-template-columns: 1fr; grid-template-rows: 1fr 100px 70px; }
            #sidebar { grid-area: sidebar; flex-direction: row; padding: 0; justify-content: space-around; border-top: 1px solid #111; }
            .logo { display: none; }
            .header-content { flex-direction: column; align-items: center; text-align: center; }
            .header-img { width: 180px; height: 180px; }
            .header-text h1 { font-size: 40px; }
            .table-header, .song-album, .player-right { display: none; }
            #player { grid-template-columns: 1fr 1fr; padding: 0 15px; }
        }
    </style>
</head>
<body>

<div class="msto-watermark">مستۆ</div>

<aside id="sidebar">
    <div class="logo">M-CHAVOSHI</div>
    <div class="nav-item active">🏠 سەرەکی</div>
    <div class="nav-item">🔍 گەڕان</div>
    <div class="nav-item">❤️ دڵخوازم</div>
</aside>

<main id="main">
    <div class="header-content">
        <img src="music/cover1.jpg" id="heroImg" class="header-img">
        <div class="header-text">
            <span id="currentSongDisplay">گۆرانیەک هەڵبژێرە</span>
            <p style="text-transform: uppercase; font-size: 14px; font-weight: 900; color: var(--text-gray); letter-spacing: 2px;">Artist</p>
            <h1>موحسین چاڤۆشی</h1>
            <p id="totalSongsLabel" style="color: var(--text-gray); font-weight: 700;"></p>
        </div>
    </div>

    <div class="song-list-container">
        <div class="table-header">
            <span>#</span><span>ناونیشان</span><span>ئەلبوم</span><span>ماوە</span><span></span>
        </div>
        <div id="fullSongList"></div>
    </div>
</main>

<div id="player">
    <div class="player-info">
        <img src="music/cover1.jpg" id="pThumb" style="width: 60px; height: 60px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
        <div>
            <div id="pTitle" style="font-weight: 900; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px;">...</div>
            <div style="font-size: 13px; color: var(--text-gray);">موحسین چاڤۆشی</div>
        </div>
    </div>

    <div class="player-controls">
        <div class="control-btns">
            <button class="repeat-btn" id="repeatBtn" onclick="toggleRepeat()" title="دووبارەکردنەوە">🔁</button>
            <button style="background:none; border:none; color:#fff; font-size:24px; cursor:pointer;" onclick="prevSong()">⏮</button>
            <button class="play-btn" id="masterPlay" onclick="togglePlay()">▶</button>
            <button style="background:none; border:none; color:#fff; font-size:24px; cursor:pointer;" onclick="nextSong()">⏭</button>
        </div>
        <div class="progress-container">
            <span id="cTime" style="font-size: 12px; min-width: 35px;">٠:٠٠</span>
            <div class="progress-bar" id="pBarWrap" onclick="seek(event)">
                <div class="progress-fill" id="pFill"></div>
            </div>
            <span id="tTime" style="font-size: 12px; min-width: 35px;">٠:٠٠</span>
        </div>
    </div>

    <div class="player-right" style="display: flex; align-items: center; gap: 15px; justify-content: flex-end;">
        <span style="font-size: 18px;">🔊</span>
        <input type="range" class="vol-slider" min="0" max="1" step="0.05" value="1" oninput="changeVol(this.value)">
    </div>
</div>

<audio id="mainAudio"></audio>

<script>
const songs = [
    { title: "کجایی", album: "Kojaei", cover: "music/cover1.jpg", src: "music/1.mp3", dur: "٣:٥٠" },
    { title: "نفس", album: "Nafas", cover: "music/cover2.jpg", src: "music/2.mp3", dur: "٤:٥٣" },
    { title: "هم خواب", album: "Hamkhab", cover: "music/cover3.jpg", src: "music/3.mp3", dur: "٢:٥٧" },
    { title: "بیاد میرافتم", album: "Miraftam", cover: "music/cover4.jpg", src: "music/4.mp3", dur: "٣:٤٣" },
    { title: "ملکا", album: "Maleka", cover: "music/cover5.jpg", src: "music/5.mp3", dur: "٤:٢٦" },
    { title: "زنگ زبور", album: "Tanhaye", cover: "music/cover6.jpg", src: "music/6.mp3", dur: "٣:١٧" },
    { title: "فاصلە", album: "Faseleh", cover: "music/cover7.jpg", src: "music/7.mp3", dur: "٥:١٤" },
    { title: "گریەهایت", album: "Khodkoshi", cover: "music/cover8.jpg", src: "music/8.mp3", dur: "٥:٣٤" },
    { title: "ساعت دیواری", album: "Saat Divari", cover: "music/cover9.jpg", src: "music/9.mp3", dur: "٣:٣٤" },
    { title: "قاتل حرفه ای", album: "Mohsen & Hamed", cover: "music/cover10.jpg", src: "music/10.mp3", dur: "٤:٢٠" },
    { title: "سر این سفرە", album: "Goldoon", cover: "music/cover11.jpg", src: "music/11.mp3", dur: "٥:٠٥" },
    { title: "ماه خورشید منی", album: "Gandom", cover: "music/cover12.jpg", src: "music/12.mp3", dur: "٤:١٢" },
    { title: "زندانبان", album: "Zendanban", cover: "music/cover13.jpg", src: "music/13.mp3", dur: "٣:٥٧" },
    { title: "پناه", album: "Panah", cover: "music/cover14.jpg", src: "music/14.mp3", dur: "٤:٢٣" },
    { title: "باب دلمی", album: "Babe Delami", cover: "music/cover15.jpg", src: "music/15.mp3", dur: "٣:١٦" },
    { title: "بە رسمی", album: "Yadegar", cover: "music/cover16.jpg", src: "music/16.mp3", dur: "٥:٣١" },
    { title: "برقصا", album: "Beraghsa", cover: "music/cover17.jpg", src: "music/17.mp3", dur: "٤:١٥" },
    { title: "همین مونده بود", album: "Single", cover: "music/cover18.jpg", src: "music/18.mp3", dur: "٣:٥٧" },
    { title: "کجا بودی", album: "Single", cover: "music/cover19.jpg", src: "music/19.mp3", dur: "٣:٣٣" },
];

let cur = -1;
let isRepeat = false;
const audio = document.getElementById('mainAudio');

function formatTime(sec) {
    if(!sec) return '٠:٠٠';
    let m = Math.floor(sec / 60);
    let s = Math.floor(sec % 60);
    const map = {'0':'٠','1':'١','2':'٢','3':'٣','4':'٤','5':'٥','6':'٦','7':'٧','8':'٨','9':'٩'};
    let time = m + ":" + (s < 10 ? "0" + s : s);
    return time.replace(/[0-9]/g, d => map[d]);
}

function renderSongs() {
    const el = document.getElementById('fullSongList');
    el.innerHTML = '';
    songs.forEach((s, i) => {
        const row = document.createElement('div');
        row.className = `song-row ${i === cur ? 'playing' : ''}`;
        row.innerHTML = `
            <span style="font-weight: bold; opacity: 0.5;">${i + 1}</span>
            <div class="song-title-group" onclick="playIt(${i})">
                <img src="${s.cover}">
                <div style="font-weight: 700;">${s.title}</div>
            </div>
            <div class="song-album" style="color: var(--text-gray);">${s.album}</div>
            <div style="color: var(--text-gray);">${s.dur}</div>
            <div style="font-size: 20px;">🤍</div>
        `;
        el.appendChild(row);
    });
}

function playIt(i) {
    cur = i;
    audio.src = songs[i].src;
    audio.play();
    document.getElementById('masterPlay').innerText = '⏸';
    document.getElementById('pTitle').innerText = songs[i].title;
    document.getElementById('pThumb').src = songs[i].cover;
    document.getElementById('heroImg').src = songs[i].cover;
    document.getElementById('currentSongDisplay').innerText = "ئێستا دەبیستیت: " + songs[i].title;
    renderSongs();
}

function togglePlay() {
    if(cur === -1) return playIt(0);
    if(audio.paused) {
        audio.play();
        document.getElementById('masterPlay').innerText = '⏸';
    } else {
        audio.pause();
        document.getElementById('masterPlay').innerText = '▶';
    }
}

function toggleRepeat() {
    isRepeat = !isRepeat;
    document.getElementById('repeatBtn').classList.toggle('active', isRepeat);
}

audio.onended = () => {
    if (isRepeat) {
        audio.play();
    } else {
        nextSong();
    }
};

audio.ontimeupdate = () => {
    if(audio.duration) {
        const pct = (audio.currentTime / audio.duration) * 100;
        document.getElementById('pFill').style.width = pct + '%';
        document.getElementById('cTime').innerText = formatTime(audio.currentTime);
        document.getElementById('tTime').innerText = formatTime(audio.duration);
    }
};

function seek(e) {
    const r = document.getElementById('pBarWrap').getBoundingClientRect();
    const pct = (e.clientX - r.left) / r.width;
    audio.currentTime = pct * audio.duration;
}

function changeVol(v) { audio.volume = v; }
function nextSong() { playIt((cur + 1) % songs.length); }
function prevSong() { playIt((cur - 1 + songs.length) % songs.length); }

document.getElementById('totalSongsLabel').innerText = formatTime(songs.length).replace(':', '') + ' گۆرانی بڵاوکراوە';
renderSongs();
</script>
</body>
</html>
