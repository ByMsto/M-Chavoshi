<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موزیک - موحسین چاڤۆشی</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/nizar-nastaliq-kurdish" rel="stylesheet">

<style>
  :root {
    --primary-green: #1db954;
    --bg-dark: #050505;
    --card-bg: rgba(255, 255, 255, 0.05);
    --glass-bg: rgba(15, 15, 15, 0.7);
    --text-main: #ffffff;
    --text-dim: #b3b3b3;
    --sidebar-width: 260px;
    --player-height: 100px;
  }

  /* 🌈 Watermark RGB - مستۆ */
  .msto-rgb-watermark {
      position: fixed;
      top: 15px; 
      left: 20px; 
      font-size: 50px !important;
      font-family: 'Nizar Nastaliq Kurdish', serif !important;
      z-index: 10000; 
      pointer-events: none;
      animation: rgb-text 6s infinite linear;
      filter: drop-shadow(0 0 15px rgba(0,0,0,0.5));
  }

  @keyframes rgb-text {
      0% { color: #ff3e3e; text-shadow: 0 0 20px #ff3e3e; }
      33% { color: #3effef; text-shadow: 0 0 20px #3effef; }
      66% { color: #ff3eff; text-shadow: 0 0 20px #ff3eff; }
      100% { color: #ff3e3e; text-shadow: 0 0 20px #ff3e3e; }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

  body {
    font-family: 'Vazirmatn', sans-serif; 
    background: var(--bg-dark);
    color: var(--text-main);
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-rows: 1fr var(--player-height);
    grid-template-columns: var(--sidebar-width) 1fr;
    grid-template-areas: "sidebar main" "player player";
  }

  /* Sidebar Design */
  #sidebar { 
    grid-area: sidebar; 
    background: #000; 
    padding: 30px 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-left: 1px solid rgba(255,255,255,0.05);
  }

  .logo { 
    font-size: 26px; 
    font-weight: 900; 
    color: var(--primary-green); 
    padding: 0 15px 30px;
    text-shadow: 0 0 15px rgba(29, 185, 84, 0.3);
  }

  .nav-item { 
    display: flex; 
    align-items: center; 
    gap: 15px; 
    padding: 14px 18px; 
    border-radius: 12px; 
    cursor: pointer; 
    color: var(--text-dim); 
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    font-weight: 700;
  }

  .nav-item:hover { 
    color: #fff; 
    background: var(--card-bg);
    transform: scale(1.02);
  }

  .nav-item.active { 
    color: #fff; 
    background: rgba(29, 185, 84, 0.15);
    border-right: 4px solid var(--primary-green);
  }

  /* Main Area Design */
  #main { 
    grid-area: main; 
    background: radial-gradient(circle at top right, #1a3a2a, #050505 60%);
    overflow-y: auto; 
    padding-bottom: 50px;
    scroll-behavior: smooth;
  }

  .main-header { 
    padding: 80px 40px 40px; 
    display: flex; 
    align-items: center; 
    gap: 40px; 
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.5));
  }

  .artist-cover { 
    width: 240px; 
    height: 240px; 
    border-radius: 20px; 
    object-fit: cover; 
    box-shadow: 0 25px 60px rgba(0,0,0,0.8);
    transition: 0.5s ease;
  }

  .artist-cover:hover { transform: scale(1.05); }

  .artist-info h1 { 
    font-size: 72px; 
    font-weight: 900; 
    margin-bottom: 15px;
    letter-spacing: -2px;
  }

  /* Song Row Styling */
  .song-list-wrapper { padding: 0 40px; }

  .song-row {
      display: grid;
      grid-template-columns: 50px 50px 1fr 180px 100px 50px;
      padding: 12px 20px;
      align-items: center;
      border-radius: 15px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: 0.2s;
  }

  .song-row:hover { 
    background: rgba(255,255,255,0.08); 
    transform: translateX(-5px);
  }

  .song-row.playing { background: rgba(29, 185, 84, 0.1); color: var(--primary-green); }

  .song-thumb { 
    width: 48px; 
    height: 48px; 
    border-radius: 8px; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }

  /* Bottom Player Design */
  #player { 
    grid-area: player; 
    background: var(--glass-bg);
    backdrop-filter: blur(25px);
    border-top: 1px solid rgba(255,255,255,0.05); 
    display: grid; 
    grid-template-columns: 300px 1fr 300px; 
    align-items: center; 
    padding: 0 30px; 
    z-index: 1000;
  }

  .player-song { display: flex; align-items: center; gap: 18px; }
  .player-thumb { width: 64px; height: 64px; border-radius: 10px; object-fit: cover; }

  .btn-play-bar { 
    width: 48px; height: 48px; 
    background: #fff; 
    border-radius: 50%; 
    color: #000; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-size: 22px; 
    transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: pointer;
    border: none;
  }

  .btn-play-bar:hover { transform: scale(1.15); box-shadow: 0 0 20px rgba(255,255,255,0.4); }

  .progress-bar-wrap { 
    flex: 1; 
    height: 6px; 
    background: rgba(255,255,255,0.1); 
    border-radius: 10px; 
    cursor: pointer; 
    position: relative; 
    overflow: hidden;
  }

  .progress-fill { 
    height: 100%; 
    background: linear-gradient(90deg, var(--primary-green), #1ed760); 
    box-shadow: 0 0 10px var(--primary-green);
  }

  .heart-icon { fill: none; stroke: #888; stroke-width: 2; transition: 0.3s; cursor: pointer; }
  .heart-icon.active { fill: var(--primary-green); stroke: var(--primary-green); filter: drop-shadow(0 0 5px var(--primary-green)); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
</style>
</head>
<body>

<div class="msto-rgb-watermark">مستۆ</div>

<aside id="sidebar">
  <div class="logo">M-CHAVOSHI</div>
  <nav class="nav-section">
    <div class="nav-item active" id="nav-home" onclick="showView('home')"><span>🏠</span> سەرەکی</div>
    <div class="nav-item" id="nav-search" onclick="showView('search')"><span>🔍</span> گەڕان</div>
    <div class="nav-item" id="nav-favorites" onclick="showView('favorites')"><span>❤️</span> دڵخوازم</div>
  </nav>
</aside>

<main id="main">
  <div id="view-home" class="views active">
    <div class="main-header">
      <div id="mainCover"><img src="music/cover1.jpg" class="artist-cover"></div>
      <div class="artist-info">
        <p style="font-size: 14px; text-transform: uppercase; font-weight: 700; color: var(--primary-green);">Featured Artist</p>
        <h1>موحسین چاڤۆشی</h1>
        <p id="songCountLabel" style="color: var(--text-dim); font-size: 18px;">٠ گۆرانی</p>
      </div>
    </div>
    
    <div class="song-list-wrapper">
      <div class="table-header" style="display: grid; grid-template-columns: 50px 50px 1fr 180px 100px 50px; padding: 20px; color: var(--text-dim); font-size: 13px; text-transform: uppercase;">
        <span>#</span><span></span><span>ناونیشان</span><span>ئەلبوم</span><span>ماوە</span><span></span>
      </div>
      <div id="songList"></div>
    </div>
  </div>

  <div id="view-search" class="views" style="padding: 60px 40px;">
      <h1 style="font-size: 40px; margin-bottom: 30px;">دۆزینەوە</h1>
      <input type="text" style="width:100%; max-width: 600px; padding:18px 25px; border-radius:50px; border:none; background:rgba(255,255,255,0.07); color:white; font-size: 18px;" placeholder="چی دەبیستیت؟" oninput="filterSongs(this.value)">
      <div id="searchResults" style="margin-top:40px;"></div>
  </div>

  <div id="view-favorites" class="views" style="padding: 60px 40px;">
      <h1 style="font-size: 40px; margin-bottom: 30px;">❤️ دڵخوازەکانم</h1>
      <div id="favoritesList"></div>
  </div>
</main>

<div id="player">
  <div class="player-song">
    <img src="music/cover1.jpg" class="player-thumb" id="playerThumb">
    <div class="player-song-text">
      <div id="playerTitle" style="font-weight: 900; font-size: 16px;">گۆرانیەک هەڵبژێرە</div>
      <div style="font-size: 13px; color: var(--text-dim);">موحسین چاڤۆشی</div>
    </div>
  </div>

  <div class="player-center">
    <div style="display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 12px;">
      <button class="ctrl-btn" onclick="prevSong()" style="font-size: 24px;">⏮</button>
      <button class="btn-play-bar" onclick="togglePlay()" id="playPauseBtn">▶</button>
      <button class="ctrl-btn" onclick="nextSong()" style="font-size: 24px;">⏭</button>
    </div>
    <div style="display: flex; align-items: center; gap: 15px; width: 100%;">
      <span id="currentTime" style="font-size:12px; color: var(--text-dim); min-width: 40px;">٠:٠٠</span>
      <div class="progress-bar-wrap" onclick="seekTo(event)"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span id="totalTime" style="font-size:12px; color: var(--text-dim); min-width: 40px;">٠:٠٠</span>
    </div>
  </div>

  <div style="display: flex; justify-content: flex-end; align-items: center; gap: 20px;">
      <span style="font-size: 20px; opacity: 0.6;">🔊</span>
      <div style="width: 100px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px;">
          <div style="width: 70%; height: 100%; background: #fff; border-radius: 10px;"></div>
      </div>
  </div>
</div>

<audio id="audioPlayer"></audio>

<script>
const songs = [
  { title: "کجایی", album: "Kojaei", cover: "music/cover1.jpg", audioSrc: "music/1.mp3", duration: "٣:٥٠" },
  { title: "نفس", album: "Nafas", cover: "music/cover2.jpg", audioSrc: "music/2.mp3", duration: "٤:٥٣" },
  { title: "هم خواب", album: "Hamkhab", cover: "music/cover3.jpg", audioSrc: "music/3.mp3", duration: "٢:٥٧" },
  { title: "من بیاد میرافتم", album: "Man Bayad Miraftam", cover: "music/cover4.jpg", audioSrc: "music/4.mp3", duration: "٣:٤٣" },
  { title: "ملکا", album: "Maleka", cover: "music/cover5.jpg", audioSrc: "music/5.mp3", duration: "٤:٢٦" },
  { title: "زنگ زبور", album: "Tanhaye", cover: "music/cover6.jpg", audioSrc: "music/6.mp3", duration: "٣:١٧" },
  { title: "فاصلە", album: "Faseleh", cover: "music/cover7.jpg", audioSrc: "music/7.mp3", duration: "٥:١٤" },
  { title: "برای گریەهایت", album: "Khodkoshi Mamnoo", cover: "music/cover8.jpg", audioSrc: "music/8.mp3", duration: "٥:٣٤" },
  { title: "ساعت دیواری", album: "Saat Divari", cover: "music/cover9.jpg", audioSrc: "music/9.mp3", duration: "٣:٣٤" },
  { title: "قاتل حرفه ای", album: "Mohsen & Hamed", cover: "music/cover10.jpg",  audioSrc: "music/10.mp3", duration: "٤:٢٠" },
  { title: "سر این سفرە", album: "Goldoon", cover: "music/cover11.jpg",  audioSrc: "music/11.mp3", duration: "٥:٠٥" },
  { title: "ماه خورشید منی", album: "Gandom Goon", cover: "music/cover12.jpg",  audioSrc: "music/12.mp3", duration: "٤:١٢" },
  { title: "زندانبان", album: "Zendanban", cover: "music/cover13.jpg",  audioSrc: "music/13.mp3", duration: "٣:٥٧" },
  { title: "پناه", album: "Panah", cover: "music/cover14.jpg",  audioSrc: "music/14.mp3", duration: "٤:٢٣" },
  { title: "باب دلمی", album: "Babe Delami", cover: "music/cover15.jpg",  audioSrc: "music/15.mp3", duration: "٣:١٦" },
  { title: "به رسمی", album: "Be Rasme Yadegar", cover: "music/cover16.jpg",  audioSrc: "music/16.mp3", duration: "٥:٣١" },
];

const audio = document.getElementById('audioPlayer');
let currentIdx = -1;
let isPlaying = false;
let favorites = JSON.parse(localStorage.getItem('mchavoshi_favs')) || [];

function toKurdishNums(n) {
  const map = {'0':'٠','1':'١','2':'٢','3':'٣','4':'٤','5':'٥','6':'٦','7':'٧','8':'٨','9':'٩'};
  return String(n).replace(/[0-9]/g, d => map[d]);
}

function formatTime(sec) {
  if (isNaN(sec)) return '٠:٠٠';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return toKurdishNums(m) + ':' + (s < 10 ? '٠' : '') + toKurdishNums(s);
}

function renderSongs(list, containerId) {
  const container = document.getElementById(containerId);
  if(!container) return;
  container.innerHTML = '';
  list.forEach((song, i) => {
    const idx = songs.indexOf(song);
    const isActive = idx === currentIdx;
    const isFav = favorites.includes(idx);
    const row = document.createElement('div');
    row.className = 'song-row' + (isActive ? ' playing' : '');
    row.innerHTML = `
      <div style="font-weight: bold; color: var(--text-dim)">${toKurdishNums(i+1)}</div>
      <div onclick="toggleFavorite(event, ${idx})"><svg class="heart-icon ${isFav ? 'active' : ''}" viewBox="0 0 24 24" width="22"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
      <div style="display: flex; align-items: center; gap: 15px;" onclick="playSong(${idx})">
        <img src="${song.cover}" class="song-thumb">
        <div style="font-weight: 700;">${song.title}</div>
      </div>
      <div style="color: var(--text-dim)">${song.album}</div>
      <div style="color: var(--text-dim)">${song.duration}</div>
      <div style="font-size: 20px; opacity: 0.5;">...</div>
    `;
    container.appendChild(row);
  });
}

function playSong(idx) {
  currentIdx = idx;
  audio.src = songs[idx].audioSrc;
  audio.play();
  isPlaying = true;
  document.getElementById('playPauseBtn').textContent = '⏸';
  updateUI();
}

function togglePlay() {
  if (currentIdx === -1) { playSong(0); return; }
  if (audio.paused) { audio.play(); isPlaying = true; document.getElementById('playPauseBtn').textContent = '⏸'; }
  else { audio.pause(); isPlaying = false; document.getElementById('playPauseBtn').textContent = '▶'; }
  renderSongs(songs, 'songList');
}

function updateUI() {
  const song = songs[currentIdx];
  document.getElementById('playerTitle').textContent = song.title;
  document.getElementById('playerThumb').src = song.cover;
  document.getElementById('mainCover').innerHTML = `<img src="${song.cover}" class="artist-cover">`;
  renderSongs(songs, 'songList');
}

function nextSong() { playSong((currentIdx + 1) % songs.length); }
function prevSong() { playSong((currentIdx - 1 + songs.length) % songs.length); }

audio.addEventListener('timeupdate', () => {
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
  document.getElementById('totalTime').textContent = formatTime(audio.duration);
});

function showView(name) {
  document.querySelectorAll('.views').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  document.getElementById('nav-' + name).classList.add('active');
  if(name === 'favorites') renderFavorites();
}

function toggleFavorite(e, idx) {
    e.stopPropagation();
    const fIdx = favorites.indexOf(idx);
    if (fIdx > -1) favorites.splice(fIdx, 1); else favorites.push(idx);
    localStorage.setItem('mchavoshi_favs', JSON.stringify(favorites));
    renderSongs(songs, 'songList');
    if (document.getElementById('view-favorites').classList.contains('active')) renderFavorites();
}

function renderFavorites() {
    const favSongs = songs.filter((_, index) => favorites.includes(index));
    renderSongs(favSongs, 'favoritesList');
}

function filterSongs(q) {
    const filtered = songs.filter(s => s.title.includes(q));
    renderSongs(filtered, 'searchResults');
}

function seekTo(e) {
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
}

document.getElementById('songCountLabel').textContent = toKurdishNums(songs.length) + ' گۆرانی';
renderSongs(songs, 'songList');
</script>
</body>
</html>
